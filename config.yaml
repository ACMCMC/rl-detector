data:
  dataset: "Ateeqq/AI-and-Human-Generated-Text"
  split: "train"

model:
  base_model: "openai/gpt-oss-120b"
  lora_rank: 32

training:
  k: 8                       # rollouts per document (K/2 AI-directed, K/2 human-directed)
  docs_per_step: 8           # documents per GRPO step (half AI, half human)
  learning_rate: 2.0e-5
  max_steps: 100
  checkpoint_every: 50       # save Tinker checkpoint every N steps
  audit_log_path: "audit_log.jsonl"

sampling:
  max_tokens: 8192
  temperature: 1.0
  top_p: 0.95
  reasoning_effort: "low"

frozen:
  model: "openai/gpt-oss-120b"
  seed: 2262
  max_concurrent: 32         # max parallel DeepInfra requests
  max_tokens: 8192
  reasoning_effort: "low"

wandb:
  enabled: true
  project: "rl-detector"
  entity: null               # set to your wandb username or team, or leave null

web:
  checkpoint_path: "tinker://737fe03b-1aa3-53a6-a6e3-422783d16d79:train:0/weights/final"      # optional default trained checkpoint path
  host: "127.0.0.1"
  port: 8000
