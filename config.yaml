data:
  dataset: "Ateeqq/AI-and-Human-Generated-Text"
  split: "train"

model:
  base_model: "openai/gpt-oss-120b"
  lora_rank: 32

training:
  k: 8                       # rollouts per document (K/2 AI-directed, K/2 human-directed)
  docs_per_step: 8           # documents per GRPO step (half AI, half human)
  label_noise_correct_prob: 0.40
  label_noise_flip_prob: 0.30
  label_noise_unknown_prob: 0.30
  learning_rate: 5.0e-5
  max_steps: 100
  checkpoint_every: 5        # save Tinker checkpoint every N steps
  audit_log_path: "audit_log.jsonl"
  granularity_weight: 0.15
  margin_weight: 0.35
  margin_target: 0.45

sampling:
  max_tokens: 8192
  temperature: 1.0
  top_p: 0.95
  reasoning_effort: "low"

frozen:
  provider: "deepinfra"      # "deepinfra" or "gemini"
  model: "openai/gpt-oss-120b"
  gemini_model: "gemini-2.5-pro-preview-05-06"
  seed: 2262
  max_concurrent: 32         # max parallel requests
  max_tokens: 8192
  reasoning_effort: "medium"    # deepinfra: reasoning_effort; gemini: thinking_level (low/medium/high)

wandb:
  enabled: true
  project: "rl-detector"
  entity: null               # set to your wandb username or team, or leave null

web:
  # checkpoint_path: "tinker://6f42d0c1-752f-5621-b727-0417ce404053:train:0/weights/best-step-25"      # optional default trained checkpoint path
  # checkpoint_path: "tinker://90e0042e-8530-5c84-83a7-7b10ad644879:train:0/sampler_weights/final"      # optional default trained checkpoint path
  # checkpoint_path: "tinker://8410fbd4-6244-5af5-8251-eb091dc2fce4:train:0/sampler_weights/final"      # optional default trained checkpoint path
  # checkpoint_path: "tinker://994fa569-56fa-54a1-9950-73e41c8a549b:train:0/sampler_weights/step-5"      # optional default trained checkpoint path
  # checkpoint_path: "tinker://d444eee2-7ebe-5af9-aaa4-b1789b7bf988:train:0/sampler_weights/best-step-10"      # optional default trained checkpoint path
  checkpoint_path: "tinker://694b8626-b046-570a-93f6-31419ac49e5e:train:0/sampler_weights/best-step-25"      # optional default trained checkpoint path
  host: "127.0.0.1"
  port: 8000
  result_cache: true
