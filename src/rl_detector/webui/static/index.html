<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RL Detector Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="wrap">
      <header class="hero">
        <p class="kicker">RL DETECTOR</p>
        <h1>Explainable AI Text Check</h1>
        <p class="subtitle">
          Paste text, run the trained checkpoint, and inspect highlighted tells with short explanations.
        </p>
      </header>

      <section class="panel" aria-label="Input">
        <label for="inputText">Text to analyze</label>
        <textarea
          id="inputText"
          rows="12"
          placeholder="Write or paste text here."
        ></textarea>
        <div class="row">
          <button id="runBtn" type="button">Run Pipeline</button>
        </div>
        <div class="engine-row" aria-live="polite">
          <span id="engineDot" class="engine-dot engine-red"></span>
          <span id="engineText" class="mono">Inference engine: loading</span>
        </div>
        <div class="progress-wrap" aria-label="Pipeline progress">
          <div class="progress-track">
            <div id="progressBar" class="progress-bar"></div>
          </div>
          <p id="progressText" class="mono progress-text">0%</p>
        </div>
        <p id="status" role="status" aria-live="polite"></p>
      </section>

      <section class="panel" aria-label="Result">
        <div class="result-head">
          <div>
            <p class="label">Verdict</p>
            <p id="verdict" class="mono">-</p>
          </div>
          <div>
            <p class="label">Aggregate score</p>
            <p id="score" class="mono">-</p>
          </div>
          <div>
            <p class="label">Checkpoint</p>
            <p id="checkpointUsed" class="mono small">-</p>
          </div>
        </div>
        <article id="annotatedText" class="annotated" aria-label="Annotated text"></article>
      </section>

      <section class="panel" aria-label="Indicators">
        <h2>Contextual explanations</h2>
        <ul id="indicators" class="indicator-list"></ul>
      </section>
    </main>

    <template id="tellTpl">
      <mark class="tell" tabindex="0">
        <span class="tell-text"></span>
        <span class="tell-tip" role="tooltip"></span>
      </mark>
    </template>

    <script src="/static/app.js" defer></script>
  </body>
</html>
